services:
  mc-server:
    image: myferr/mc-server:latest
    ports:
      - "25565:25565"
    environment:
      VERSION: "1.21"
      HARDCORE: "false"
      GAMEMODE: "survival"
      CHEATS: "false"
      MAXPLAYERS: "20"
      MOTD: "Welcome to my compose server!"
    volumes:
      - ./data:/server

